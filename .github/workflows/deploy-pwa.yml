name: Deploy PWA to GitHub Pages

# Publishes the pwa/ folder to GitHub Pages over HTTPS so the PDF Viewer PWA
# can be installed and its file handlers / service worker work (both require a
# secure origin). Only the pwa/ subtree is deployed — the extension files are
# left out of the published site.

on:
  push:
    branches: [main]
    paths:
      - "pwa/**"
      - "viewer/**"
      - "pdfjs/**"
      - ".github/workflows/deploy-pwa.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # Requires Pages to be enabled once in repo Settings → Pages →
        # Build and deployment → Source: "GitHub Actions". (The Actions token
        # can't create the Pages site itself, so this is a one-time manual step.)
        uses: actions/configure-pages@v5

      - name: Assemble site (PWA shell + canonical viewer + PDF.js)
        run: bash pwa/build-site.sh "$GITHUB_WORKSPACE/_site"

      - name: Upload the assembled site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
