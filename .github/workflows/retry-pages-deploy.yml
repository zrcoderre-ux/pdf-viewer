name: Retry failed Pages deploy

# GitHub Pages deployment (actions/deploy-pages) intermittently fails with a
# transient "Deployment failed, try again later." When that happens the build
# is fine but the live site silently stays on the previous version. This
# watchdog re-runs the failed jobs of the Deploy PWA workflow so a flaky deploy
# self-heals instead of needing a manual re-run.
#
# It's bounded: run_attempt caps total attempts at 3, so a genuinely broken
# deploy (bad config, real error) stops retrying instead of looping forever.

on:
  workflow_run:
    workflows: ["Deploy PWA to GitHub Pages"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3 }}
    runs-on: ubuntu-latest
    steps:
      - name: Re-run the failed deploy jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          echo "Deploy run $RUN_ID failed on attempt $ATTEMPT — re-running failed jobs after a short pause."
          # Give the transient Pages condition a moment to clear before retrying.
          sleep 30
          gh run rerun "$RUN_ID" --failed --repo "$REPO"
