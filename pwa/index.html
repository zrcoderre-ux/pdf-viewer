<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PDF Viewer</title>
  <meta name="theme-color" content="#1e293b">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="toolbar">
    <span id="app-name">PDF Viewer</span>
    <span id="filename"></span>
    <span class="spacer"></span>
    <span id="status">Drop a PDF or click Open</span>
    <button id="zoom-out" title="Zoom out" disabled>−</button>
    <span id="zoom-level">100%</span>
    <button id="zoom-in" title="Zoom in" disabled>+</button>
    <button id="open-btn" title="Open a PDF">Open…</button>
    <input id="file-input" type="file" accept="application/pdf,.pdf" hidden>
  </header>

  <main id="viewer" tabindex="0" aria-label="PDF pages">
    <div id="dropzone">
      <div class="dz-inner">
        <div class="dz-icon" aria-hidden="true">📄</div>
        <p class="dz-title">Open a PDF</p>
        <p class="dz-sub">Click here (or <strong>Open…</strong>) to browse your computer, or drop a PDF in. Once installed, PDFs you open from your system also land here in a dedicated window.</p>
      </div>
    </div>
    <div id="pages"></div>
  </main>

  <script type="module" src="viewer.js"></script>
  <script>
    // Register the service worker (required for installability + offline shell).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) =>
          console.warn("SW registration failed:", e)
        );
      });
    }
  </script>
</body>
</html>
