<!DOCTYPE html>
<html lang="en">
<!--
  PWA shell with a tab bar. This page is only a tab manager: each open PDF is a
  separate <iframe> running the canonical viewer (viewer/viewer.html), so every
  tab is a fully isolated viewer instance (its own zoom, highlights, OCR, etc.)
  with no shared state. The shell hosts no viewer markup itself — that lives in
  the iframes — so there is nothing here to keep in sync with the extension.
-->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PDF Viewer</title>
  <meta name="theme-color" content="#1e293b">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app-web.css">
</head>
<body>
  <div id="tabstrip">
    <div id="tabs" role="tablist"></div>
    <button id="new-tab" title="Open another PDF">+</button>
    <span class="strip-spacer"></span>
  </div>

  <div id="tab-views"></div>

  <div id="dropzone">
    <div class="dz-inner">
      <div class="dz-icon" aria-hidden="true">📄</div>
      <p class="dz-title">Open a PDF</p>
      <p class="dz-sub">Click here (or the <strong>+</strong> tab) to browse your computer, or drop PDFs in. Each PDF opens in its own tab — with citation links, OCR, highlighting, and the Table of Authorities. Once installed, PDFs you open from your system land here too.</p>
    </div>
  </div>

  <input id="file-input" type="file" accept="application/pdf,.pdf" multiple hidden>

  <script type="module" src="app-web.js"></script>
</body>
</html>
